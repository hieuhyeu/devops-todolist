# Nginx Reverse Proxy Configuration
# File này cài trên OS (không phải trong container)
# Copy vào: /etc/nginx/sites-available/todoapp.conf
# Symlink:  ln -s /etc/nginx/sites-available/todoapp.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name nguyen-trung-hieu2-k23.rikkeieducation.com;

    # ===== Gzip Compression =====
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ===== Giới hạn upload file =====
    client_max_body_size 10M;

    # ===== Frontend: / -> React App =====
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ===== Backend: /api -> Spring Boot =====
    location /api {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
