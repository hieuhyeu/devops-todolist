name: CI/CD Deploy TodoApp

# ===== Trigger: push vào main hoặc production =====
on:
  push:
    branches:
      - main
      - production

jobs:
  # ====== Job: Build và Deploy ======
  deploy:
    name: Build & Deploy to Server
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. SSH vào server, pull code mới, build và deploy
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Di chuyển vào thư mục project
            cd ~/devops-todolist

            # Pull code mới nhất
            git pull origin ${{ github.ref_name }}

            # Build lại images và restart containers
            docker compose down
            docker compose build --no-cache
            docker compose up -d

            # Dọn dẹp images cũ
            docker image prune -f

            # Kiểm tra containers đang chạy
            docker compose ps
